version: "3.9"

services:
  nebula-copilot:
    build:
      context: .
      dockerfile: Dockerfile
    image: nebula-copilot:latest
    container_name: nebula-copilot
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    command: ["agent-analyze", "trace_mock_2026_0001", "--source", "data/mock_trace.json", "--llm-enabled"]

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
    container_name: nebula-es
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsSL http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
