name: CI Smoke Test

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    services:
      elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
        env:
          discovery.type: single-node
          xpack.security.enabled: "false"
          ES_JAVA_OPTS: "-Xms512m -Xmx512m"
        ports:
          - 9200:9200
        options: >-
          --health-cmd="curl -fsSL http://localhost:9200 >/dev/null || exit 1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Wait for Elasticsearch
        run: |
          for i in {1..30}; do
            if curl -fsSL "http://localhost:9200" >/dev/null; then
              echo "Elasticsearch is ready"
              exit 0
            fi
            sleep 2
          done
          echo "Elasticsearch not ready in time"
          exit 1

      - name: Seed demo trace docs to nebula_metrics
        run: |
          python - <<'PY'
          from elasticsearch import Elasticsearch
          es = Elasticsearch('http://localhost:9200')
          docs = [
              {
                  "traceId": "ci-smoke-trace-001",
                  "methodName": "main",
                  "duration": 1200,
                  "timestamp": 1893456000000,
                  "serviceName": "ci-service",
                  "sampled": True,
              },
              {
                  "traceId": "ci-smoke-trace-001",
                  "methodName": "payOrder",
                  "duration": 450,
                  "timestamp": 1893456001000,
                  "serviceName": "ci-service",
                  "sampled": True,
              },
          ]
          for d in docs:
            es.index(index='nebula_metrics', document=d, refresh='wait_for')
          print('Seeded nebula_metrics for smoke test')
          PY

      - name: Run smoke test script
        env:
          NEBULA_ES_URL: http://localhost:9200
          SMOKE_LAST_MINUTES: "10000000"
        run: |
          chmod +x scripts/smoke_test.sh
          ./scripts/smoke_test.sh nebula_metrics

      - name: Run agent-analyze smoke
        run: |
          python -m nebula_copilot.cli seed ci-agent-trace --output /tmp/agent_mock.json --scenario timeout
          python -m nebula_copilot.cli agent-analyze ci-agent-trace --source /tmp/agent_mock.json --runs-path /tmp/agent_runs.json

      - name: Run agent-analyze with llm flag (fallback-safe)
        run: |
          python -m nebula_copilot.cli agent-analyze ci-agent-trace --source /tmp/agent_mock.json --runs-path /tmp/agent_runs_llm.json --llm-enabled

      - name: Run M3 graph acceptance tests
        run: pytest -q tests/test_agent_graph.py

      - name: Run M4 notifier acceptance tests
        run: pytest -q tests/test_notifier.py

      - name: Run M4 runtime guard acceptance tests
        run: pytest -q tests/test_runtime_guard.py

      - name: Validate deployment assets
        run: |
          test -f Dockerfile
          test -f docker-compose.yml
          test -f deploy/k8s/deployment.yaml
          test -f deploy/k8s/secret.example.yaml
          docker build -t nebula-copilot:ci .

      - name: Run full pytest
        run: pytest -q

  llm-live-smoke:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Check LLM secret availability
        id: key_check
        env:
          GH_MODELS_API_KEY: ${{ secrets.GH_MODELS_API_KEY }}
        run: |
          if [ -n "$GH_MODELS_API_KEY" ]; then
            echo "has_key=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_key=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Live LLM smoke via GH models
        if: steps.key_check.outputs.has_key == 'true'
        env:
          GH_MODELS_API_KEY: ${{ secrets.GH_MODELS_API_KEY }}
          LLM_ENABLED: "true"
          LLM_PROVIDER: "github"
          LLM_MODEL: "gpt-4.1-mini"
          LLM_REPORT_POLISH_ENABLED: "true"
        run: |
          python -m nebula_copilot.cli seed ci-live-llm-trace --output /tmp/live_llm_mock.json --scenario timeout
          python -m nebula_copilot.cli agent-analyze ci-live-llm-trace --source /tmp/live_llm_mock.json --runs-path /tmp/live_llm_runs.json --llm-enabled

      - name: Live LLM smoke skipped
        if: steps.key_check.outputs.has_key != 'true'
        run: echo "GH_MODELS_API_KEY missing; Live LLM smoke skipped"
