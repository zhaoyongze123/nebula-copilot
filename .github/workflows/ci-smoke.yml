name: CI Smoke Test

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    services:
      elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
        env:
          discovery.type: single-node
          xpack.security.enabled: "false"
          ES_JAVA_OPTS: "-Xms512m -Xmx512m"
        ports:
          - 9200:9200
        options: >-
          --health-cmd="curl -fsSL http://localhost:9200 >/dev/null || exit 1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Wait for Elasticsearch
        run: |
          for i in {1..30}; do
            if curl -fsSL "http://localhost:9200" >/dev/null; then
              echo "Elasticsearch is ready"
              exit 0
            fi
            sleep 2
          done
          echo "Elasticsearch not ready in time"
          exit 1

      - name: Seed demo trace docs to nebula_metrics
        run: |
          python - <<'PY'
          from elasticsearch import Elasticsearch
          es = Elasticsearch('http://localhost:9200')
          docs = [
              {
                  "traceId": "ci-smoke-trace-001",
                  "methodName": "main",
                  "duration": 1200,
                  "timestamp": 1893456000000,
                  "serviceName": "ci-service",
                  "sampled": True,
              },
              {
                  "traceId": "ci-smoke-trace-001",
                  "methodName": "payOrder",
                  "duration": 450,
                  "timestamp": 1893456001000,
                  "serviceName": "ci-service",
                  "sampled": True,
              },
          ]
          for d in docs:
            es.index(index='nebula_metrics', document=d, refresh='wait_for')
          print('Seeded nebula_metrics for smoke test')
          PY

      - name: Run smoke test script
        env:
          NEBULA_ES_URL: http://localhost:9200
          SMOKE_LAST_MINUTES: "10000000"
        run: |
          chmod +x scripts/smoke_test.sh
          ./scripts/smoke_test.sh nebula_metrics
