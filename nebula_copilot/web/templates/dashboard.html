<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nebula 可观测排障台 (SkyWalking Style)</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.30.0/cytoscape.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
</head>
<body>
  <div class="layout-wrapper">
    <!-- 侧边栏导航 -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <span class="logo-text">Nebula</span>
        <span class="logo-sub">APM</span>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-item active" data-target="panel-dashboard">全局看板</div>
        <div class="nav-item" data-target="panel-topology">服务拓扑</div>
        <div class="nav-item" data-target="panel-trace">链路追踪</div>
        <div class="nav-item" data-target="panel-runs">执行记录</div>
      </nav>
    </aside>

    <!-- 主体内容 -->
    <main class="main-content">
      <!-- 顶栏控制 -->
      <header class="topbar">
        <div class="page-title">可观测排障台</div>
        <div class="controls">
          <label style="display: flex; align-items: center; gap: 4px; cursor: pointer;">
            自动刷新
            <input id="autoRefresh" type="checkbox" checked />
          </label>
          <button id="refreshBtn" class="btn-primary">刷新数据</button>
          <button id="importDemoBtn" class="btn-secondary">导入测试数据</button>
        </div>
      </header>

      <div class="content-body">
        <!-- 仪表板视图 -->
        <section id="panel-dashboard" class="panel active">
          <!-- KPI 区域 -->
          <div id="kpiGrid" class="kpi-grid" style="display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap;"></div>
          
          <div class="dashboard-grid">
            <div class="chart-card">
              <h3>Service Apdex</h3>
              <div id="apdexChart" style="width: 100%; height: 250px;"></div>
            </div>
            <div class="chart-card">
              <h3>Service Avg Response Time (ms)</h3>
              <div id="responseTimeChart" style="width: 100%; height: 250px;"></div>
            </div>
          </div>
        </section>

        <!-- 拓扑视图 -->
        <section id="panel-topology" class="panel" style="display: none;">
          <div id="cy" style="width: 100%; height: 600px; background: #252a36; border-radius: 4px;"></div>
        </section>

        <!-- 链路视图 -->
        <section id="panel-trace" class="panel" style="display: none;">
          <div class="search-bar" style="margin-bottom: 12px; display: flex; gap: 8px;">
            <input id="traceIdInput" type="text" placeholder="输入 Trace ID (例如 123456789)" style="padding: 6px; width: 300px; background: #252a36; border: 1px solid #444; color: #fff; border-radius: 4px;" />
            <button id="searchTraceBtn" class="btn-primary">查询</button>
            <span id="traceStatusText" style="color: #aaa; margin-left: 10px; line-height: 28px;"></span>
          </div>
          <div class="trace-container" style="display: flex; gap: 16px; height: calc(100vh - 160px);">
            <!-- 树状结构和甘特图 -->
            <div id="traceGanttContainer" class="gantt-container" style="flex: 2; overflow-y: auto; background: #252a36; padding: 12px; border-radius: 4px;">
              <div class="gantt-header" style="display: flex; border-bottom: 1px solid #444; padding-bottom: 8px; margin-bottom: 8px; font-weight: bold; color: #fff;">
                <div class="g-col-name" style="flex: 2;">服务端点</div>
                <div class="g-col-duration" style="flex: 1;">耗时(ms)</div>
                <div class="g-col-timeline" style="flex: 3;">执行时间轴</div>
              </div>
              <div id="ganttBody" class="gantt-body"></div>
            </div>
            <!-- 右侧详情面板 -->
            <div id="traceDetailPanel" class="detail-panel" style="flex: 1; display: block; background: #252a36; padding: 16px; overflow-y: auto; border-radius: 4px; color: #ddd; max-height: 100%;">
              <h3 style="margin-top: 0; color: #fff; border-bottom: 1px solid #444; padding-bottom: 10px;">智能诊断分析</h3>
              <div id="diagnosisResultContent">请输入 Trace ID 查询数据以获取排障报告...</div>
              
              <h3 style="margin-top: 20px; color: #fff; border-bottom: 1px solid #444; padding-bottom: 10px;">Span 详情</h3>
              <div id="spanDetailContent">点击左侧链路中的节点以查看微服务及异常详细信息</div>
            </div>
          </div>
        </section>

        <!-- 执行记录视图 -->
        <section id="panel-runs" class="panel" style="display: none;">
           <div class="search-bar" style="margin-bottom: 12px; display: flex; gap: 8px;">
             <button id="loadRunsBtn" class="btn-primary">加载最新记录</button>
           </div>
           <div style="background: #252a36; padding: 16px; border-radius: 4px;">
             <table style="width: 100%; text-align: left; color: #ddd; border-collapse: collapse;">
               <thead>
                 <tr style="border-bottom: 1px solid #444;">
                   <th style="padding: 8px 0;">状态</th>
                   <th>Trace ID</th>
                   <th>服务</th>
                   <th>耗时</th>
                   <th>运行时间</th>
                   <th>操作</th>
                 </tr>
               </thead>
               <tbody id="runsTableBody">
                 <!-- 自动注入 -->
               </tbody>
             </table>
           </div>
        </section>

      </div>
    </main>
  </div>

  <script>
    // 切换面板逻辑
    document.querySelectorAll('.nav-item').forEach(item => {
      item.addEventListener('click', function() {
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        this.classList.add('active');
        
        const targetId = this.getAttribute('data-target');
        document.querySelectorAll('.panel').forEach(p => {
          if (p.id === targetId) {
            p.classList.add('active');
            p.style.display = 'block';
          } else {
            p.classList.remove('active');
            p.style.display = 'none';
          }
        });
        
        // 触发 ECharts 重绘避雷坑
        if (targetId === 'panel-dashboard') {
          setTimeout(() => {
            window.dispatchEvent(new Event('resize'));
          }, 0);
        }
      });
    });
  </script>
  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
